baseURL = 'https://fpietrosanti.github.io/osservatorio-nazionale-sovranita-digitale/'
defaultContentLanguage = 'it'
defaultContentLanguageInSubdir = false
title = 'Osservatorio Nazionale Sovranità Digitale'

[params]
  description = 'Misurare e monitorare lo stato della sovranità digitale nella Pubblica Amministrazione italiana'
  author = 'Fabio Pietrosanti'
  mxmapURL = 'https://mxmap.it/'
  # ─── Evento di rilascio report + presentazione alla Camera ───────────
  # DATA DUMMY — da confermare. Aggiornare qui per propagare nel banner.
  eventActive = true
  eventDate = '15 ottobre 2026'
  eventDateISO = '2026-10-15'
  eventProvisional = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[pagination]
  pagerSize = 10

# ─── Languages ───────────────────────────────────────────────────────
# Italian is the default (content at root). Other EU languages serve
# content from content/<lang>/ and appear under /<lang>/ URLs.
# To activate a language: create content/<lang>/ with translated files.

