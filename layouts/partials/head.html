<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ site.Title }}</title>

<link rel="icon" type="image/svg+xml" href="{{ "brand/favicon.svg" | relURL }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ "brand/favicon-32.png" | relURL }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ "brand/favicon-16.png" | relURL }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ "brand/apple-touch-icon.png" | relURL }}">

<meta property="og:site_name" content="{{ site.Title }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ site.Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ "brand/og-image.png" | absURL }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ site.Title }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta name="twitter:image" content="{{ "brand/og-image.png" | absURL }}">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.18.1/dist/css/bootstrap-italia.min.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap">
<link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ "index.xml" | absURL }}">
<style>
  .hero-custom { background: var(--bs-primary); color: #fff; padding: 4rem 0 3rem; }
  .hero-custom h1 { font-size: 2.5rem; font-weight: 700; }
  .hero-custom .lead { font-size: 1.2rem; opacity: .9; }
  .card-wrapper .card { height: 100%; }
  .section-spacing { padding: 3rem 0; }
  .section-spacing-lg { padding: 4rem 0; }
  .bg-section-alt { background: #f2f7fc; }
  .article-content h2 { margin-top: 2rem; }
  .article-content h3 { margin-top: 1.5rem; }
  .info-box-custom { background: #f2f7fc; border-left: 4px solid var(--bs-primary); border-radius: .5rem; padding: 2rem; }
</style>
