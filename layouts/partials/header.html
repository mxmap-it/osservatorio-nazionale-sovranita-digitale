{{ $spritesURL := "https://cdn.jsdelivr.net/npm/bootstrap-italia@2.18.1/dist/svg/sprites.svg" }}
<header class="it-header-wrapper" data-bs-target="#header-nav1">
  <div class="it-header-slim-wrapper">
    <div class="container-xxl">
      <div class="row">
        <div class="col-12">
          <div class="it-header-slim-wrapper-content">
            <a class="d-none d-lg-block navbar-brand" href="{{ site.Params.mxmapURL }}" target="_blank" rel="noopener">Progetto MxMap.it</a>
            <div class="nav-mobile">
              <nav aria-label="Navigazione accessoria">
                <a class="it-opener d-lg-none" data-bs-toggle="collapse" href="#slimMenu" role="button" aria-expanded="false" aria-controls="slimMenu">
                  <span>Progetto MxMap.it</span>
                  <svg class="icon" aria-hidden="true"><use href="{{ $spritesURL }}#it-expand"></use></svg>
                </a>
                <div class="link-list-wrapper collapse" id="slimMenu">
                  <ul class="link-list">
                    <li><a class="dropdown-item list-item" href="{{ site.Params.mxmapURL }}" target="_blank" rel="noopener">MxMap.it</a></li>
                    <li><a class="dropdown-item list-item" href="https://github.com/fpietrosanti/osservatorio-nazionale-sovranita-digitale" target="_blank" rel="noopener">GitHub</a></li>
                  </ul>
                </div>
              </nav>
            </div>
            <div class="it-header-slim-right-zone">
              <a class="btn btn-primary btn-sm btn-icon" href="https://github.com/fpietrosanti/osservatorio-nazionale-sovranita-digitale" target="_blank" rel="noopener">
                <span class="rounded-icon">
                  <svg class="icon icon-primary icon-sm" aria-hidden="true"><use href="{{ $spritesURL }}#it-github"></use></svg>
                </span>
                <span class="d-none d-lg-inline">GitHub</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="it-header-center-wrapper">
    <div class="container-xxl">
      <div class="row">
        <div class="col-12">
          <div class="it-header-center-content-wrapper">
            <div class="it-brand-wrapper">
              <a href="{{ "/" | relURL }}">
                <svg class="icon" aria-hidden="true">
                  <use href="{{ $spritesURL }}#it-pa"></use>
                </svg>
                <div class="it-brand-text">
                  <div class="it-brand-title">Osservatorio Nazionale</div>
                  <div class="it-brand-tagline d-none d-md-block">Sovranità Digitale</div>
                </div>
              </a>
            </div>
            <div class="it-right-zone">
              <div class="it-socials d-none d-md-flex">
                <span>Seguici su</span>
                <ul>
                  <li>
                    <a href="https://github.com/fpietrosanti/osservatorio-nazionale-sovranita-digitale" aria-label="GitHub" target="_blank" rel="noopener">
                      <svg class="icon"><use href="{{ $spritesURL }}#it-github"></use></svg>
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="it-header-navbar-wrapper">
    <div class="container-xxl">
      <div class="row">
        <div class="col-12">
          <nav class="navbar navbar-expand-lg has-megamenu" aria-label="Navigazione principale">
            <button class="custom-navbar-toggler" type="button" aria-controls="header-nav1" aria-label="Mostra/Nascondi la navigazione" data-bs-toggle="navbarcollapsible" data-bs-target="#header-nav1">
              <svg class="icon bg-override"><use href="{{ $spritesURL }}#it-burger"></use></svg>
            </button>
            <div class="navbar-collapsable" id="header-nav1" tabindex="-1">
              <div class="overlay" style="display:none"></div>
              <div class="close-div">
                <button class="btn close-menu" type="button">
                  <span class="visually-hidden">Nascondi la navigazione</span>
                  <svg class="icon"><use href="{{ $spritesURL }}#it-close-big"></use></svg>
                </button>
              </div>
              <div class="menu-wrapper">
                <ul class="navbar-nav">
                  {{ range site.Menus.main }}
                  <li class="nav-item">
                    <a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>
                      <span>{{ .Name }}</span>
                    </a>
                  </li>
                  {{ end }}
                </ul>
              </div>
            </div>
          </nav>
        </div>
      </div>
    </div>
  </div>
</header>
