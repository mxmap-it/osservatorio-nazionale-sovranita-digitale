{{ define "main" }}
<section class="section">
  <div class="container">
    <h1 class="section-title">{{ .Title }}</h1>
    {{ .Content }}
    <div class="card-grid">
      {{ range .Pages }}
      <article class="card">
        <div class="card-body">
          <time class="card-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ partial "date-it.html" .Date }}</time>
          <h2 class="card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p class="card-summary">{{ .Summary }}</p>
          {{ with .Params.pdf }}
          <a href="{{ . | relURL }}" class="btn btn-small" download>Scarica PDF</a>
          {{ end }}
        </div>
      </article>
      {{ end }}
    </div>
    {{ template "_internal/pagination.html" . }}
  </div>
</section>
{{ end }}
