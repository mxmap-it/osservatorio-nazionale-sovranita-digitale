<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="cloudact-bar" href="https://www.senat.fr/compte-rendu-commissions/20250609/ce_commande_publique.html" target="_blank" rel="noopener" aria-label="{{ i18n "cloudActAria" }}">
    <span class="cloudact-inner container-xxl">
      <svg class="cloudact-ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 2 1 21h22L12 2Zm0 6a1 1 0 0 1 1 1v5a1 1 0 0 1-2 0V9a1 1 0 0 1 1-1Zm0 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5Z"/></svg>
      <span class="cloudact-q">{{ i18n "cloudActQuote" }}</span>
      <span class="cloudact-src">{{ i18n "cloudActSource" }} &rsaquo;</span>
    </span>
  </a>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <a class="telegram-fab" href="https://t.me/+Ot-M_g0dkh1kMGI0" target="_blank" rel="noopener" aria-label="{{ i18n "tgFab" }}"
     style="position:fixed;right:18px;bottom:18px;z-index:1030;display:inline-flex;align-items:center;gap:8px;background:#0088cc;color:#fff;padding:10px 16px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.28);text-decoration:none;font-weight:600;font-size:.95rem;">
    <svg class="icon icon-sm icon-white" aria-hidden="true"><use href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.18.1/dist/svg/sprites.svg#it-telegram"></use></svg>
    <span>Telegram</span>
  </a>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.18.1/dist/js/bootstrap-italia.bundle.min.js"></script>
  <script>
    (function () {
      function initNav() {
        if (window.bootstrap && window.bootstrap.NavBarCollapsible) {
          document.querySelectorAll('.navbar-collapsable').forEach(function (el) {
            window.bootstrap.NavBarCollapsible.getOrCreateInstance(el);
          });
        }
      }
      if (document.readyState !== 'loading') { initNav(); }
      else { document.addEventListener('DOMContentLoaded', initNav); }
    })();
    (function () {
      var w = document.querySelector('.beta-wrap'); if (!w) return;
      function set(o) { w.classList.toggle('open', o); w.setAttribute('aria-expanded', o ? 'true' : 'false'); }
      w.addEventListener('click', function (e) { if (e.target.closest('a')) return; e.stopPropagation(); set(!w.classList.contains('open')); });
      document.addEventListener('click', function (e) { if (!w.contains(e.target)) set(false); });
      w.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { set(false); }
        else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); set(!w.classList.contains('open')); }
      });
    })();
  </script>
</body>
</html>
